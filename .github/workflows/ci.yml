name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pinned images (no ``-latest``) so a runner-image rollover can't
        # break CI silently. ``macos-14`` was already pinned per
        # PROJECT_PLAN.md §10 R-13 mitigation; ``ubuntu-24.04`` applies
        # the same risk shape to the Linux runner and mirrors the pin in
        # ``pip-audit.yml`` (PR #33). Bump both deliberately when a new
        # GitHub-hosted image is desired.
        os: [ubuntu-24.04, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Type check (mypy --strict)
        run: uv run mypy

      - name: Tests (pytest)
        run: uv run pytest

      - name: Coverage gate — segment-merge module (NFR-8 100% lines)
        # NFR-8 mandates 100% line coverage on the segment-merge module.
        # The TF-only lazy-import paths inside ``InaSpeechSegmenter``
        # carry ``# pragma: no cover`` per ADR-0011 — production
        # execution requires TensorFlow + pyannote, which is the
        # contract surface Tier 2 contract tests cover (POD-030) when
        # run with the heavy deps installed. The merge logic
        # (``_normalize_to_segments`` / ``to_jsonl`` / ``Segment``) is
        # what NFR-8 actually targets, and the pragma-aware gate below
        # holds it to 100%.
        run: |
          uv run pytest \
            --cov=podcast_script.segment \
            --cov-report=term-missing \
            --cov-fail-under=100 \
            tests/unit/test_segment.py tests/unit/test_segment_property.py

      - name: Tests (Tier 2 / contract)
        # ADR-0017 mandates Tier 2 on every PR + push, matrix Ubuntu +
        # macOS. The default suite excludes ``contract`` (keeps the
        # unit-tier feedback loop sub-second); this step opts in. The
        # parametrized backend fixture skips real-backend params on
        # ImportError per ADR-0011 — so on Ubuntu the ``mlx-whisper``
        # parametrisation is skipped (PEP 508 marker excludes it from
        # ``uv sync`` outside darwin/arm64), and on macOS-14 both real
        # backends run. FakeBackend always runs. POD-030.
        run: uv run pytest -m contract -v

      - name: Tests (Tier 3 / slow integration)
        # ADR-0017 mandates Tier 3 on every PR + push, matrix Ubuntu +
        # macOS. The default suite excludes ``slow`` (sub-second feedback
        # for the unit tier); this step opts in. First-run downloads the
        # ``faster-whisper`` ``tiny`` model (~75 MB) on a cold cache.
        run: uv run pytest -m slow
